services:
  ixport:
    build: .
    ports:
      - "8890:8890"
    env_file:
      - path: .env
        required: false
    environment:
      INVENTORY_EXPLORER_URL: ${INVENTORY_EXPLORER_URL:-http://ixnse.ashai.online:3001}
      SESSION_EXPLORER_URL:   ${SESSION_EXPLORER_URL:-http://host.docker.internal:8080}
    restart: unless-stopped

  ixport-mcp:
    build: .
    command: python mcp/server.py
    ports:
      - "8887:8887"
    environment:
      IXPORT_API_URL: http://ixport:8890
    depends_on:
      - ixport
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: changeme-influx-admin
      DOCKER_INFLUXDB_INIT_ORG: ixport
      DOCKER_INFLUXDB_INIT_BUCKET: port_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: df-linocnK8uapajl3o8LfE5uIdPYch8CrS6gv4rDPO-t5woazw8_3cAt4idHVVf5zdpI3J5JIMA67pTOrZUPg==

volumes:
  influxdb-data:
